name: Docs

# Documentation integrity gate. Markdown committed under docs/ (and the root
# AGENTS.md / STATUS.md / README.md / PROJECT_STATUS.md) is the source of truth,
# so a broken internal link is a real defect.
#
# - `links` runs on every push/PR: a dependency-free Python link checker
#   (scripts/validate-docs.sh) verifies every internal Markdown link resolves.
#   No network, no Node, ~1s. This is the blocking gate.
# - `blume-build` is an opt-in render verification (workflow_dispatch + PR): it
#   installs the pinned Blume version, builds the site, and runs `blume
#   validate` so a bad frontmatter/meta.ts or a render-time breakage is caught
#   before deploy. It does NOT block the links gate (continue-on-error).
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links:
    name: Broken-link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate internal Markdown links
        run: bash scripts/validate-docs.sh

  blume-build:
    name: Blume render verify (opt-in)
    runs-on: ubuntu-latest
    # Render verify is non-blocking: Blume is the presentation layer, not the
    # source of truth. A failure here is a heads-up, not a red build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build docs site
        run: pnpm docs:build
      - name: Validate links (Blume)
        run: pnpm docs:validate
